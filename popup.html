<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    
    h3 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px 0;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    
    .toggle-label {
      font-size: 14px;
      font-weight: bold;
      color: #555;
    }
    
    /* Стилизация переключателя */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #4CAF50;
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    
    .status-text {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin: 5px 0;
    }
    
    .url-info {
      font-size: 11px;
      color: #999;
      word-break: break-all;
      padding: 5px;
      background: #fff;
      border-radius: 4px;
      margin-top: 10px;
    }
    
    button {
      width: 100%;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <h3>Мой улучшатель</h3>
  
  <div class="toggle-container">
    <span class="toggle-label">Включить функции</span>
    <label class="switch">
      <input type="checkbox" id="mainToggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="status-text" id="status">Статус: выключено</div>
  <div class="url-info" id="currentUrl">Загрузка...</div>
  
  <button id="applyNow">Применить на текущей странице</button>
  
  <script src="popup.js"></script>
</body>
</html>
